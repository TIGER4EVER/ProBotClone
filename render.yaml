services:
  - type: web
    name: probot-clone
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./data/probot.db
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: BASE_URL
        sync: false
    disk:
      name: probot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
