version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: probot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-probot_db}
      MYSQL_USER: ${MYSQL_USER:-probot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-probot_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - probot-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: probot-app
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-probot}:${MYSQL_PASSWORD:-probot_password}@mysql:3306/${MYSQL_DATABASE:-probot_db}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL}
      PORT: 3000
      VITE_APP_TITLE: ${VITE_APP_TITLE:-ProBot Clone}
      VITE_APP_ID: ${VITE_APP_ID}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - probot-network
    command: sh -c "pnpm drizzle-kit migrate && pnpm start"
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: probot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - probot-network
    restart: unless-stopped

networks:
  probot-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
